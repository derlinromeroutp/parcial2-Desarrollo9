<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SafeTech — Rediseño</title>
<style>
  html, body { margin: 0; padding: 0; background: #F4F4F2; font-family: 'Geist', system-ui, sans-serif; height: 100%; }
  #root { min-height: 100vh; }
  /* Tab switcher flotante */
  .st-switcher {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    z-index: 100; display: flex; gap: 4px;
    background: rgba(31, 29, 26, 0.94); backdrop-filter: blur(20px);
    padding: 6px; border-radius: 999px;
    box-shadow: 0 12px 40px rgba(31,29,26,0.25);
  }
  .st-switcher button {
    background: transparent; color: rgba(239,237,232,0.6);
    border: none; padding: 8px 18px; font-size: 13px; font-weight: 500;
    border-radius: 999px; cursor: pointer; font-family: inherit;
    transition: all 0.25s cubic-bezier(0.16,1,0.3,1);
  }
  .st-switcher button:hover { color: #EFEDE8; }
  .st-switcher button.active {
    background: #EFEDE8; color: #1F1D1A;
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="safetech/design-system.jsx"></script>
<script type="text/babel" src="safetech/components/Header.jsx"></script>
<script type="text/babel" src="safetech/components/Footer.jsx"></script>
<script type="text/babel" src="safetech/components/HeroSection.jsx"></script>
<script type="text/babel" src="safetech/components/ProcessAndTrust.jsx"></script>
<script type="text/babel" src="safetech/components/BenefitsAndProducts.jsx"></script>
<script type="text/babel" src="safetech/components/MoreSections.jsx"></script>
<script type="text/babel" src="safetech/components/LoginAndAdmin.jsx"></script>
<script type="text/babel" src="safetech/components/Catalog.jsx"></script>
<script type="text/babel" src="safetech/components/Pages.jsx"></script>

<script type="text/babel" data-presets="react">
const LandingPage = () => (
  <div className="st-root">
    <STHeader active="INICIO" />
    <STHero />
    <STTrustBar />
    <STProcessTimeline />
    <STBenefitsGrid />
    <STProductShowcase />
    <STWarrantyFlow />
    <STStats />
    <STFAQ />
    <STFinalCTA />
    <STFooter />
  </div>
);

const LoginScreen = () => (
  <div className="st-root">
    <STLoginPage />
  </div>
);

const AdminScreen = () => (
  <div className="st-root">
    <STAdminDashboard />
  </div>
);

const CatalogScreen = () => <STCatalog />;
const OrdersScreen = () => <STOrdersPage />;
const AboutScreen = () => <STAboutPage />;
const ContactScreen = () => <STContactPage />;

const App = () => {
  const [view, setView] = React.useState('landing');
  React.useEffect(() => { window.scrollTo(0, 0); }, [view]);

  return (
    <>
      {view === 'landing' && <LandingPage />}
      {view === 'catalog' && <CatalogScreen />}
      {view === 'orders' && <OrdersScreen />}
      {view === 'about' && <AboutScreen />}
      {view === 'contact' && <ContactScreen />}
      {view === 'login' && <LoginScreen />}
      {view === 'admin' && <AdminScreen />}

      <div className="st-switcher">
        <button className={view === 'landing' ? 'active' : ''} onClick={() => setView('landing')}>Landing</button>
        <button className={view === 'catalog' ? 'active' : ''} onClick={() => setView('catalog')}>Catálogo</button>
        <button className={view === 'orders' ? 'active' : ''} onClick={() => setView('orders')}>Pedidos</button>
        <button className={view === 'about' ? 'active' : ''} onClick={() => setView('about')}>Nosotros</button>
        <button className={view === 'contact' ? 'active' : ''} onClick={() => setView('contact')}>Contacto</button>
        <button className={view === 'login' ? 'active' : ''} onClick={() => setView('login')}>Login</button>
        <button className={view === 'admin' ? 'active' : ''} onClick={() => setView('admin')}>Admin</button>
      </div>
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
